apiVersion: v1
kind: Service
metadata:
  name: speechpilot-backend
  labels:
    app.kubernetes.io/name: speechpilot-backend
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: speechpilot-backend
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP