apiVersion: apps/v1
kind: Deployment
metadata:
  name: speechpilot-backend-api
  labels:
    app.kubernetes.io/name: speechpilot-backend
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: speechpilot-backend
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: speechpilot-backend
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: speechpilot-backend
      containers:
        - name: speechpilot-backend-api
          image: speechpilot-backend:latest
          imagePullPolicy: Always
          command:
            - uvicorn
            - app.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: speechpilot-backend-config
            - secretRef:
                name: speechpilot-backend-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi