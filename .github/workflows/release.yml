name: Release APK

on:
  push:
    tags:
      - 'release-v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-release-apk:
    name: Build and publish release APK
    runs-on: ubuntu-latest

    # Only publish when the tagged commit is reachable from main
    if: github.ref_type == 'tag'

    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "Tag ${{ github.ref_name }} does not point to a commit on main. Aborting."
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Locate APK
        id: locate_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "apk_path=${APK_PATH}" >> "$GITHUB_OUTPUT"
          echo "Found APK at: ${APK_PATH}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpeechPilot-${{ github.ref_name }}
          path: ${{ steps.locate_apk.outputs.apk_path }}
          retention-days: 90

      - name: Create GitHub Release and attach APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SpeechPilot ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ steps.locate_apk.outputs.apk_path }}
          generate_release_notes: true
