name: Backend Build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build backend wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build ./src/backend --outdir ./dist/backend

      - name: Install built wheel and verify import
        run: |
          python -m pip install ./src/contracts/python
          python -m pip install ./dist/backend/*.whl
          python -c "from app.main import create_app; create_app()"

      - name: Build backend container image
        run: |
          docker build -f src/backend/Dockerfile .