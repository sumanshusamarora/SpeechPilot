name: Backend CI

on:
  push:
    branches: ["main"]
    tags:
      - "staging-*"
      - "production-*"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      SPEECHPILOT_ENVIRONMENT: test
      SPEECHPILOT_REALTIME_STORE_BACKEND: managed
      AWS_EC2_METADATA_DISABLED: "true"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend and contracts
        run: |
          python -m pip install --upgrade pip
          pip install -e ./src/contracts/python -e './src/backend[dev]'

      - name: Run backend test suite
        run: |
          python -m pytest -q src/backend/tests