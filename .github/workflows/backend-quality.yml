name: Backend Quality

on:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend and contracts
        run: |
          python -m pip install --upgrade pip
          pip install -e ./src/contracts/python -e './src/backend[dev]'

      - name: Compile source and tests
        run: |
          python -m compileall src/backend/app src/backend/tests scripts

      - name: Validate backend import
        run: |
          python -c "from app.main import create_app; create_app()"